name: Build Go CLI

on:
  push:
    branches: [golang-migration]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            ldflags: "-w"
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            ldflags: "-w"
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            ldflags: "-s -w"
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            ldflags: "-s -w"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          go mod tidy
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="${{ matrix.ldflags }}" -o trustarc-cli-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/

      - uses: actions/upload-artifact@v4
        with:
          name: trustarc-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: trustarc-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release delete golang-migration-latest --yes 2>/dev/null || true
          gh release create golang-migration-latest \
            --title "golang-migration (latest)" \
            --notes "Auto-built from the golang-migration branch on every push." \
            --prerelease \
            trustarc-cli-darwin-arm64 \
            trustarc-cli-darwin-amd64 \
            trustarc-cli-linux-amd64 \
            trustarc-cli-linux-arm64
