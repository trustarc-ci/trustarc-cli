name: Build Go CLI

on:
  push:
    branches: [golang-migration]
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: arm64
            runner: macos-latest
          - goos: darwin
            goarch: amd64
            runner: macos-latest
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Tidy and build
        run: |
          go mod tidy
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="-s -w" -o trustarc-cli-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: trustarc-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: trustarc-cli-${{ matrix.goos }}-${{ matrix.goarch }}
          retention-days: 14
